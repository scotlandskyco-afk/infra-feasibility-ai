version: '3.9'

services:

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ggc_user
      POSTGRES_PASSWORD: ggc_pass
      POSTGRES_DB: infra_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ggc_user -d infra_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://ggc_user:ggc_pass@db:5432/infra_db
    volumes:
      - .:/app
      - cache_data:/app/cache
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      - API_BASE=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  cache_data:
